name: m0x41-podman
title: Podman (miah0x41 package)
version: "5.8.1"
contact: https://github.com/miah0x41
source-code: https://github.com/miah0x41/m0x41-podman
license: Apache-2.0
summary: A tool for managing OCI containers and pods (unofficial package)
description: |
  _Podman_ is a daemonless, rootless container engine for developing,
  managing, and running OCI containers and pods on Linux. It is a
  drop-in replacement for Docker that does not require a background
  daemon or root privileges.

  This is an unofficial snap built directly from upstream Podman v5.8.1
  sources. It bundles all runtime dependencies (`crun`, `conmon`, `netavark`,
  `aardvark-dns`, `fuse-overlayfs`, `slirp4netns`, `catatonit`). Rootless
  mode requires `uidmap` and `dbus-user-session` on the host (installed by
  default on Ubuntu Desktop, but not on server or minimal installs).
  Non-Ubuntu distros (Debian, CentOS, Fedora) also require `iptables` for
  rootful networking. The snap's install hook
  automatically configures systemd generators for Quadlet
  and places `podman` on PATH at `/usr/local/bin/podman`.

  Rootless networking uses `slirp4netns` rather than `pasta`, which is the
  default in upstream Podman v5.x but is unavailable on the `core22`
  (Ubuntu 22.04) base used by this snap. Built on `core22` (`glibc` 2.35)
  for broad cross-distro compatibility (`glibc` >= 2.34).

  **Tested distributions (rootless and rootful):**

  * Ubuntu 22.04 — pass (`apt install uidmap dbus-user-session`)
  * Ubuntu 24.04 — pass (`apt install uidmap dbus-user-session`)
  * Debian 12 — pass (`apt install uidmap dbus-user-session iptables`)
  * CentOS 9 Stream — pass (`dnf install shadow-utils dbus-daemon iptables-nft libgpg-error`)
  * Fedora 42 — rootful pass (`dnf install shadow-utils dbus-daemon iptables-nft libgpg-error`);
    rootless fails in LXD due to missing setuid on `newuidmap`

  This snap has been extensively tested across the distributions listed
  above in both rootless and rootful modes. However, it is provided
  as-is with no warranty or liability. See the project repository for
  full test methodology and results.

  The install hook places `podman` on PATH at /usr/local/bin/podman.
  Man pages are included — `man podman`, `man podman-run`, etc. work
  out of the box. Quadlet (systemd container integration) is supported.

base: core22
confinement: classic
grade: stable

architectures:
  - build-on: amd64

apps:
  m0x41-podman:
    command: bin/podman-wrapper
    environment:
      CONTAINERS_CONF: /snap/m0x41-podman/current/etc/containers/containers.conf
      CONTAINERS_REGISTRIES_CONF: /snap/m0x41-podman/current/etc/containers/registries.conf
      CONTAINERS_STORAGE_CONF: /snap/m0x41-podman/current/etc/containers/storage.conf

parts:
  go:
    plugin: nil
    build-packages:
      - curl
    override-build: |
      curl -fsSL https://go.dev/dl/go1.24.2.linux-amd64.tar.gz -o /tmp/go.tar.gz
      mkdir -p $CRAFT_PART_INSTALL/usr/local
      tar -C $CRAFT_PART_INSTALL/usr/local -xzf /tmp/go.tar.gz
      rm /tmp/go.tar.gz
    prime:
      - -*

  crun:
    plugin: nil
    source: https://github.com/containers/crun.git
    source-tag: "1.19.1"
    source-depth: 1
    build-packages:
      - autoconf
      - automake
      - gcc
      - libcap-dev
      - libseccomp-dev
      - libsystemd-dev
      - libtool
      - libyajl-dev
      - make
      - pkg-config
      - python3
    stage-packages:
      - libyajl2
    override-build: |
      ./autogen.sh
      ./configure --prefix=/usr
      make -j$(nproc)
      make install DESTDIR=$CRAFT_PART_INSTALL

  conmon:
    plugin: nil
    build-packages:
      - curl
      - gcc
      - git
      - libc6-dev
      - libglib2.0-dev
      - libseccomp-dev
      - libsystemd-dev
      - pkg-config
      - make
    override-build: |
      CONMON_VERSION="2.0.26"
      curl -fsSL "https://github.com/containers/conmon/archive/refs/tags/v${CONMON_VERSION}.tar.gz" \
        -o /tmp/conmon.tar.gz
      tar -xzf /tmp/conmon.tar.gz -C /tmp
      cd /tmp/conmon-${CONMON_VERSION}
      make -j$(nproc)
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      install -m 755 bin/conmon $CRAFT_PART_INSTALL/usr/bin/conmon
      rm -rf /tmp/conmon-${CONMON_VERSION} /tmp/conmon.tar.gz

  netavark:
    plugin: nil
    build-packages:
      - curl
    override-build: |
      NETAVARK_VERSION="1.14.1"
      AARDVARK_VERSION="1.14.0"
      mkdir -p $CRAFT_PART_INSTALL/usr/lib/podman
      curl -fsSL "https://github.com/containers/netavark/releases/download/v${NETAVARK_VERSION}/netavark.gz" \
        | gunzip > $CRAFT_PART_INSTALL/usr/lib/podman/netavark
      curl -fsSL "https://github.com/containers/aardvark-dns/releases/download/v${AARDVARK_VERSION}/aardvark-dns.gz" \
        | gunzip > $CRAFT_PART_INSTALL/usr/lib/podman/aardvark-dns
      chmod +x $CRAFT_PART_INSTALL/usr/lib/podman/netavark $CRAFT_PART_INSTALL/usr/lib/podman/aardvark-dns

  podman:
    plugin: nil
    source: https://github.com/containers/podman.git
    source-tag: "v5.8.1"
    source-depth: 1
    after: [go]
    build-packages:
      - gcc
      - git
      - libassuan-dev
      - libbtrfs-dev
      - libc6-dev
      - libdevmapper-dev
      - libglib2.0-dev
      - libgpg-error-dev
      - libgpgme-dev
      - libprotobuf-dev
      - libprotobuf-c-dev
      - libseccomp-dev
      - libselinux1-dev
      - libsystemd-dev
      - make
      - pkg-config
    stage-packages:
      - catatonit
      - fuse-overlayfs
      - libfuse3-3
      - slirp4netns
      - libgpgme11
      - libseccomp2
      - libassuan0
      - iptables
    override-build: |
      export PATH=$CRAFT_STAGE/usr/local/go/bin:$PATH
      export GOPATH=$(mktemp -d)
      # Propagate LD_LIBRARY_PATH in healthcheck transient units (see docs/investigations/HEALTHCHECK_ISSUES.md)
      patch -p1 < $CRAFT_PROJECT_DIR/patches/healthcheck-ld-library-path.patch
      # Override binary path in generated systemd units (see docs/investigations/RCCA-GENERATE-SYSTEMD.md)
      patch -p1 < $CRAFT_PROJECT_DIR/patches/generate-systemd-binary-path.patch
      make podman podman-remote rootlessport quadlet -j$(nproc)
      make docs || true
      make install.bin PREFIX=/usr DESTDIR=$CRAFT_PART_INSTALL
      make install.systemd PREFIX=/usr DESTDIR=$CRAFT_PART_INSTALL
      if [ -d docs/build/man ]; then
        make install.man PREFIX=/usr DESTDIR=$CRAFT_PART_INSTALL || true
      fi
    prime:
      - -usr/lib/systemd/user/gpg-agent*
      - -usr/lib/systemd/user/dirmngr*
      - -usr/share/doc/gnupg/examples/systemd-user

  configs:
    plugin: dump
    source: snap/
    organize:
      containers.conf: etc/containers/containers.conf
      storage.conf: etc/containers/storage.conf
      registries.conf: etc/containers/registries.conf
      policy.json: etc/containers/policy.json

  wrapper:
    plugin: dump
    source: scripts/
    organize:
      podman-wrapper: bin/podman-wrapper
      conmon-wrapper: bin/conmon-wrapper
      crun-wrapper: bin/crun-wrapper
