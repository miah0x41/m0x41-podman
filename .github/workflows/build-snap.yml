name: Build Snap

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Rename snap artifact
        run: |
          version="${GITHUB_REF_NAME#v}"
          mv ${{ steps.build.outputs.snap }} "m0x41-podman_${version}_amd64.snap"
          echo "snap_file=m0x41-podman_${version}_amd64.snap" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksum
        run: sha256sum "${{ env.snap_file }}" > "${{ env.snap_file }}.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign with cosign (keyless)
        run: |
          cosign sign-blob "${{ env.snap_file }}" \
            --bundle "${{ env.snap_file }}.cosign-bundle" \
            --yes

      - name: Attest provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ env.snap_file }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.snap_file }}
            ${{ env.snap_file }}.sha256
            ${{ env.snap_file }}.cosign-bundle
